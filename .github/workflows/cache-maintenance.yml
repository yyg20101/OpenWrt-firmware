name: Cache Maintenance

on:
  workflow_dispatch:
    inputs:
      older_than_days:
        description: "Delete caches not accessed for at least this many days"
        required: true
        default: "7"
        type: string
      prefix:
        description: "Only consider caches whose key starts with this prefix"
        required: false
        default: ""
        type: string
      ref:
        description: "Only consider caches for this ref, for example refs/heads/main"
        required: false
        default: ""
        type: string
      keep_latest:
        description: "Keep this many newest matched caches even if they are old"
        required: true
        default: "2"
        type: string
      dry_run:
        description: "List caches without deleting them"
        required: true
        default: true
        type: boolean

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    name: Cleanup Actions Caches
    runs-on: ubuntu-22.04
    steps:
      - name: Cleanup Caches
        uses: actions/github-script@v9
        env:
          OLDER_THAN_DAYS: ${{ inputs.older_than_days }}
          CACHE_PREFIX: ${{ inputs.prefix }}
          CACHE_REF: ${{ inputs.ref }}
          KEEP_LATEST: ${{ inputs.keep_latest }}
          DRY_RUN: ${{ inputs.dry_run }}
        with:
          script: |
            const olderThanDays = Number(process.env.OLDER_THAN_DAYS);
            const prefix = process.env.CACHE_PREFIX || "";
            const ref = process.env.CACHE_REF || "";
            const keepLatest = Number(process.env.KEEP_LATEST);
            const dryRunInput = process.env.DRY_RUN || "true";
            const dryRun = /^(true|True|TRUE)$/.test(dryRunInput);

            if (!/^(true|True|TRUE|false|False|FALSE)$/.test(dryRunInput)) {
              throw new Error(`dry_run must be true or false, got ${dryRunInput}`);
            }

            if (!Number.isFinite(olderThanDays) || olderThanDays < 0) {
              throw new Error(`older_than_days must be a non-negative number, got ${olderThanDays}`);
            }
            if (!Number.isInteger(keepLatest) || keepLatest < 0) {
              throw new Error(`keep_latest must be a non-negative integer, got ${keepLatest}`);
            }
            if (!dryRun && !prefix && !ref) {
              throw new Error("Refusing to delete caches without a prefix or ref filter. Set prefix or ref, or run with dry_run=true.");
            }

            const cutoff = Date.now() - olderThanDays * 24 * 60 * 60 * 1000;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const matched = [];

            for await (const response of github.paginate.iterator(github.rest.actions.getActionsCacheList, {
              owner,
              repo,
              per_page: 100,
            })) {
              for (const cache of response.data.actions_caches ?? []) {
                if (prefix && !cache.key.startsWith(prefix)) continue;
                if (ref && cache.ref !== ref) continue;
                matched.push(cache);
              }
            }

            matched.sort((a, b) => new Date(b.last_accessed_at) - new Date(a.last_accessed_at));
            const protectedCaches = new Set(matched.slice(0, keepLatest).map((cache) => cache.id));
            const candidates = [];
            for (const cache of matched) {
              if (protectedCaches.has(cache.id)) continue;
              const lastAccessed = new Date(cache.last_accessed_at).getTime();
              if (lastAccessed > cutoff) continue;
              candidates.push(cache);
            }

            candidates.sort((a, b) => new Date(a.last_accessed_at) - new Date(b.last_accessed_at));
            core.summary.addHeading("Cache cleanup candidates");
            core.summary.addRaw(`Dry run: ${dryRun}\n\n`);
            core.summary.addRaw(`Prefix: ${prefix || "(any)"}\n\n`);
            core.summary.addRaw(`Ref: ${ref || "(any)"}\n\n`);
            core.summary.addRaw(`Older than days: ${olderThanDays}\n\n`);
            core.summary.addRaw(`Keep latest: ${keepLatest}\n\n`);
            core.summary.addRaw(`Matched caches before retention: ${matched.length}\n\n`);

            if (candidates.length === 0) {
              core.summary.addRaw("No caches matched.\n");
              await core.summary.write();
              return;
            }

            core.summary.addTable([
              [
                { data: "ID", header: true },
                { data: "Key", header: true },
                { data: "Ref", header: true },
                { data: "Size", header: true },
                { data: "Last accessed", header: true },
              ],
              ...candidates.map((cache) => [
                String(cache.id),
                cache.key,
                cache.ref,
                `${(cache.size_in_bytes / 1024 / 1024).toFixed(2)} MiB`,
                cache.last_accessed_at,
              ]),
            ]);

            for (const cache of candidates) {
              const message = `${dryRun ? "Would delete" : "Deleting"} cache ${cache.id}: ${cache.key}`;
              core.info(message);
              if (!dryRun) {
                await github.rest.actions.deleteActionsCacheById({
                  owner,
                  repo,
                  cache_id: cache.id,
                });
              }
            }

            await core.summary.write();
