name: Firmware CI
run-name: Firmware CI / ${{ github.event.inputs.target || github.event.client_payload.target || 'x86_64_immortalWrt' }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Profile or group to build"
        required: true
        default: "x86_64_immortalWrt"
        type: choice
        options:
          - x86_64_LEDE
          - x86_64_immortalWrt
          - Qualcommax_LEDE
          - Qualcommax_V
          - Qualcommax_B
          - x86_64_all
          - qualcommax_all
          - all
      release:
        description: "Publish successful builds to GitHub Releases"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types:
      - firmware-ci

permissions:
  contents: write
  actions: read

jobs:
  resolve:
    name: Resolve Build Matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      make_latest: ${{ steps.resolve.outputs.make_latest }}
      release: ${{ steps.resolve.outputs.release }}
      target: ${{ steps.resolve.outputs.target }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Resolve Target
        id: resolve
        env:
          INPUT_TARGET: ${{ github.event.inputs.target }}
          INPUT_RELEASE: ${{ github.event.inputs.release }}
          PAYLOAD_TARGET: ${{ github.event.client_payload.target }}
          PAYLOAD_RELEASE: ${{ github.event.client_payload.release }}
        run: |
          set -euo pipefail

          target="${INPUT_TARGET:-${PAYLOAD_TARGET:-x86_64_immortalWrt}}"
          release_raw="${INPUT_RELEASE:-${PAYLOAD_RELEASE:-false}}"

          case "${release_raw}" in
            true|TRUE|True|1|yes|YES|Yes) release="true" ;;
            *) release="false" ;;
          esac

          matrix="$(bash scripts/ci/profiles.sh matrix "${target}" "" "${GITHUB_WORKSPACE}")"
          selected_count="$(ruby -rjson -e 'payload = JSON.parse(STDIN.read); puts Array(payload.fetch("include")).length' <<< "${matrix}")"
          if [ "${release}" = "true" ] && [ "${selected_count}" -eq 1 ]; then
            make_latest="true"
          else
            make_latest="false"
          fi

          append_output() {
            local key="$1"
            local value="$2"
            local delimiter="EOF_${key}_${RANDOM}_$(date +%s%N)"
            {
              printf '%s<<%s\n' "${key}" "${delimiter}"
              printf '%s\n' "${value}"
              printf '%s\n' "${delimiter}"
            } >> "${GITHUB_OUTPUT}"
          }

          append_output "target" "${target}"
          append_output "release" "${release}"
          append_output "make_latest" "${make_latest}"
          append_output "matrix" "${matrix}"

  build:
    name: Build ${{ matrix.profile }}
    needs: resolve
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}
    uses: ./.github/workflows/firmware-build.yml
    with:
      profile: ${{ matrix.profile }}
      make_latest: ${{ needs.resolve.outputs.make_latest == 'true' }}
      release: ${{ needs.resolve.outputs.release == 'true' }}
    secrets: inherit
