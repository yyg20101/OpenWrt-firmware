name: CI Lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "devices/**"
      - "files/**"
      - "docs/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "devices/**"
      - "files/**"
      - "docs/**"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository / 检出仓库
        uses: actions/checkout@v6

      - name: Actionlint / 工作流静态检查
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

      - name: Validate Workflow YAML / 校验工作流 YAML
        run: |
          set -euo pipefail
          ruby -e "require 'yaml'; Dir['.github/workflows/*.yml'].each { |f| YAML.load_file(f) }"

      - name: Validate Shell Syntax / 校验 Shell 语法
        run: |
          set -euo pipefail
          find scripts -type f -name "*.sh" -print0 \
            | xargs -0 -n1 bash -n

      - name: Validate Firmware Profiles / 校验固件配置
        run: |
          set -euo pipefail
          bash scripts/ci/validate-profiles.sh

      - name: Validate Dependabot Coverage / 校验 Dependabot 覆盖
        run: |
          set -euo pipefail
          bash scripts/ci/validate-dependabot-coverage.sh

      - name: Validate Cache Maintenance / 校验缓存清理保护
        run: |
          set -euo pipefail
          bash scripts/ci/validate-cache-maintenance.sh

      - name: Validate Cache Key Policy / 校验缓存 Key 策略
        run: |
          set -euo pipefail
          bash scripts/ci/validate-cache-key-policy.sh

      - name: Validate LuCI Chinese Policy / 校验 LuCI 中文策略
        run: |
          set -euo pipefail
          bash scripts/ci/validate-luci-zh-cn-config.sh

      - name: Validate PassWall Overlay Policy / 校验 PassWall 覆盖策略
        run: |
          set -euo pipefail
          bash scripts/ci/validate-passwall-overlay.sh

      - name: Validate Release Maintenance / 校验发布清理保护
        run: |
          set -euo pipefail
          bash scripts/ci/validate-release-maintenance.sh

      - name: Validate Optimization Health Fixture / 校验优化健康报告
        run: |
          set -euo pipefail
          bash scripts/ci/optimization-report.sh summary "$PWD"
          bash scripts/ci/test-optimization-report.sh

      - name: Validate Artifact Release Fixture / 校验产物与发布元数据
        run: |
          set -euo pipefail
          bash scripts/ci/test-artifacts-release.sh

      - name: Validate X86 Smoke Fixture / 校验 X86 烟测夹具
        run: |
          set -euo pipefail
          bash scripts/ci/test-smoke-x86.sh

      - name: Validate Config Audit Fixture / 校验配置审计夹具
        run: |
          set -euo pipefail
          bash scripts/ci/test-config-audit.sh

      - name: Validate Config Feeds Fixture / 校验配置加载夹具
        run: |
          set -euo pipefail
          bash scripts/ci/test-config-feeds.sh
