name: Optimization Health

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  health:
    name: Firmware Optimization Health
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository / 检出仓库
        uses: actions/checkout@v6

      - name: Validate Firmware Profiles / 校验固件配置
        run: |
          set -euo pipefail
          bash scripts/ci/validate-profiles.sh

      - name: Generate Optimization Summary / 生成优化摘要
        run: |
          set -euo pipefail
          mkdir -p optimization-health
          bash scripts/ci/optimization-report.sh summary "$PWD" | tee optimization-health/summary.md
          cat optimization-health/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Profile Drift Report / 生成上游漂移报告
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          bash scripts/ci/optimization-report.sh profile-drift "$PWD" "$REPOSITORY" | tee optimization-health/profile-drift.md
          cat optimization-health/profile-drift.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Cache Health / 生成缓存健康报告
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          bash scripts/ci/optimization-report.sh cache "$REPOSITORY" | tee optimization-health/cache.md
          cat optimization-health/cache.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Optimization Health Report / 上传优化健康报告
        uses: actions/upload-artifact@v7
        with:
          name: optimization-health-${{ github.run_id }}
          path: optimization-health/*
          if-no-files-found: error
          retention-days: 14
