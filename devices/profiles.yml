version: 1

defaults:
  timezone: Asia/Shanghai
  pre_feeds_script: scripts/common/diy-part1.sh
  post_feeds_script: scripts/common/diy-part2.sh
  general_script: scripts/common/General.sh
  package_base_script: scripts/common/Packages.sh
  package_overlay_script: scripts/common/package
  make_download_jobs: 8

profiles:
  x86_64_LEDE:
    title: x86_64 LEDE
    enabled: true
    source_repo: https://github.com/coolsnowwolf/lede
    source_branch: master
    firmware_tag: X86-64
    cache_group: x86_64
    config: devices/x86_64_LEDE/.config
    config_fragments:
      - scripts/common/config/base.config
      - scripts/common/config/storage.config
      - scripts/common/config/usb-mobile.config
      - scripts/common/config/proxy.config
      - scripts/common/config/samba.config
      - scripts/common/config/x86.config
      - scripts/common/config/x86-performance.config
      - scripts/common/config/lede-extra.config

  x86_64_immortalWrt:
    title: x86_64 ImmortalWrt
    enabled: true
    source_repo: https://github.com/immortalwrt/immortalwrt
    source_branch: master
    firmware_tag: X86-64
    cache_group: x86_64
    config: devices/x86_64_immortalWrt/.config
    config_fragments:
      - scripts/common/config/base.config
      - scripts/common/config/storage.config
      - scripts/common/config/usb-mobile.config
      - scripts/common/config/proxy.config
      - scripts/common/config/samba.config
      - scripts/common/config/x86.config
      - scripts/common/config/x86-performance.config
      - scripts/common/config/immortalwrt-extra.config

  Qualcommax_LEDE:
    title: Qualcommax LEDE
    enabled: true
    source_repo: https://github.com/coolsnowwolf/lede
    source_branch: master
    firmware_tag: qualcommax
    cache_group: qualcommax
    config: devices/Qualcommax_LEDE/.config
    config_fragments:
      - scripts/common/config/base.config
      - scripts/common/config/storage.config
      - scripts/common/config/usb-mobile.config
      - scripts/common/config/proxy.config
      - scripts/common/config/samba.config
      - scripts/common/config/qualcommax-ipq60xx.config
      - scripts/common/config/lede-extra.config

  Qualcommax_V:
    title: Qualcommax V
    enabled: true
    source_repo: https://github.com/VIKINGYFY/immortalwrt
    source_branch: main
    firmware_tag: qualcommax
    cache_group: qualcommax
    config: devices/Qualcommax_V/.config
    config_fragments:
      - scripts/common/config/base.config
      - scripts/common/config/storage.config
      - scripts/common/config/usb-mobile.config
      - scripts/common/config/proxy.config
      - scripts/common/config/samba.config
      - scripts/common/config/qualcommax-ipq60xx.config

  Qualcommax_B:
    title: Qualcommax B
    enabled: true
    source_repo: https://github.com/LiBwrt/openwrt-6.x
    source_branch: kernel-6.12
    firmware_tag: qualcommax
    cache_group: qualcommax
    config: devices/Qualcommax_B/.config
    config_fragments:
      - scripts/common/config/base.config
      - scripts/common/config/storage.config
      - scripts/common/config/usb-mobile.config
      - scripts/common/config/proxy.config
      - scripts/common/config/samba.config
      - scripts/common/config/qualcommax-ipq60xx.config
